appId: com.techsavvy.browser
productName: Tech Savvy Browser
copyright: Copyright © 2026 Maalig

directories:
  output: release
  buildResources: build

files:
  - dist/**/*
  - dist-electron/**/*
  - package.json
  - '!**/node_modules/*/{CHANGELOG.md,README.md,README,readme.md,readme}'
  - '!**/node_modules/*/{test,__tests__,tests,powered-test,example,examples}'
  - '!**/node_modules/*.d.ts'
  - '!**/node_modules/.bin'

asar: true
asarUnpack:
  - node_modules/node-pty/**

# ---------- Windows ----------
win:
  target:
    - target: nsis
      arch: [x64, arm64]
  icon: resources/icons/icon.ico
  artifactName: ${productName}-${version}-${arch}.${ext}

nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
  runAfterFinish: true
  installerIcon: resources/icons/icon.ico
  uninstallerIcon: resources/icons/icon.ico

# ---------- Linux ----------
linux:
  maintainer: Maalig <iampmpksamy@gmail.com
  target:
    - AppImage
    - deb
  category: Network
  icon: resources/icons/icon.png
  artifactName: ${productName}-${version}-${arch}.${ext}
  desktop:
    Name: Tech Savvy Browser
    Comment: AI-native, dev-first web browser
    Categories: Network;WebBrowser;Development;

# ---------- macOS ----------
mac:
  target:
    - target: dmg
      arch: [x64, arm64]
    - target: zip
      arch: [x64, arm64]
  category: public.app-category.developer-tools
  icon: resources/icons/icon.icns
  hardenedRuntime: true
  gatekeeperAssess: false
  entitlements: build/entitlements.mac.plist
  entitlementsInherit: build/entitlements.mac.plist
  artifactName: ${productName}-${version}-${arch}.${ext}

# ---------- Auto-update ----------
publish:
  provider: github
  owner: your-gh-user-or-org
  repo: tech-savvy-browser
  releaseType: release
